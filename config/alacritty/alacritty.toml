[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
padding = { x = 12, y = 10 }
dynamic_padding = true
decorations = "Full"
opacity = 0.96

[font]
size = 10.0

[font.normal]
family = "DejaVu Sans Mono"
style = "Regular"

[font.bold]
family = "DejaVu Sans Mono"
style = "Bold"

[font.italic]
family = "DejaVu Sans Mono"
style = "Italic"

[font.offset]
x = 0
y = 1

[selection]
save_to_clipboard = true

[scrolling]
history = 50000
multiplier = 3

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
blink_timeout = 5
unfocused_hollow = true

[mouse]
hide_when_typing = true

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
white = "#a6adc8"

[keyboard]
bindings = [
  # Alacritty
  { key = "N",      mods = "Control|Shift", action = "CreateNewWindow" },
  { key = "V",      mods = "Control|Shift", action = "Paste" },
  { key = "C",      mods = "Control|Shift", action = "Copy" },
  { key = "Equals", mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control",       action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control",       action = "ResetFontSize" },
  # Tmux splits (sends Ctrl+Space then the split key)
  { key = "D",      mods = "Control|Shift", chars = "\u0000|" },
  { key = "D",      mods = "Control",       chars = "\u0000-" },
  # Tmux pane navigation
  { key = "H",      mods = "Control|Shift", chars = "\u0000h" },
  { key = "J",      mods = "Control|Shift", chars = "\u0000j" },
  { key = "K",      mods = "Control|Shift", chars = "\u0000k" },
  { key = "L",      mods = "Control|Shift", chars = "\u0000l" },
  # Tmux window / tab navigation
  { key = "Left",   mods = "Control|Shift", chars = "\u0000p" },
  { key = "Right",  mods = "Control|Shift", chars = "\u0000n" },
  # Tmux new window / tab
  { key = "T",      mods = "Control|Shift", chars = "\u0000c" },
  # Tmux session management
  { key = "S",      mods = "Control|Shift", chars = "\u0000s" },
]
